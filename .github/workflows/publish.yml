name: Publish

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml

permissions:
  contents: read

jobs:
  publish-mcp-vector:
    name: publish-mcp-vector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract workspace version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check that a matching release tag exists
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git fetch --tags
          if ! git tag --list | grep -qx "$TAG"; then
            echo "No release tag $TAG found — skipping publish."
            exit 1
          fi
          echo "Tag $TAG confirmed. Proceeding with publish."

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Publish mcp-vector to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_TARGET_DIR: target
        run: cargo publish -p mcp-vector
