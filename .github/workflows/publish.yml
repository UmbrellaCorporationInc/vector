name: Publish

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml

permissions:
  contents: read

jobs:
  verify-installable:
    name: verify-installable
    runs-on: ubuntu-latest

    env:
      CARGO_TARGET_DIR: target

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract workspace version
        id: version
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check that a matching release tag exists
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git fetch --tags
          if ! git tag --list | grep -qx "$TAG"; then
            echo "No release tag $TAG found — skipping."
            exit 1
          fi
          echo "Tag $TAG confirmed."

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify cargo install --git works
        run: |
          cargo install --git https://github.com/${{ github.repository }} \
            --tag v${{ steps.version.outputs.version }} \
            mcp-vector
