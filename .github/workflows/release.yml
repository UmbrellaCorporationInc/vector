name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    name: bump-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update workspace version in Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml

      - name: Verify change
        run: grep '^version' Cargo.toml

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: release/bump-${{ steps.version.outputs.tag }}
          commit-message: "chore: bump workspace version to ${{ steps.version.outputs.version }}"
          title: "chore: bump workspace version to ${{ steps.version.outputs.version }}"
          body: |
            Automated version bump triggered by release ${{ steps.version.outputs.tag }}.

            Once this PR is merged, the `publish` workflow will publish `mcp-vector` to crates.io.

            **Release:** ${{ github.event.release.html_url }}
          labels: release
