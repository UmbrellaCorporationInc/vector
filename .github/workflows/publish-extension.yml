name: Publish Extension

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: "Release tag to upload the vsix to (e.g. ext-v1.4.2)"
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-extension:
    name: publish-extension
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      startsWith(github.event.release.tag_name, 'ext-')

    defaults:
      run:
        working-directory: frontend/vscode/vector

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/vscode/vector/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#ext-v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Ensure release tag exists
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        run: |
          TAG="ext-v${{ steps.version.outputs.version }}"
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Release $TAG" \
              --target main
          fi

      - name: Package extension
        run: pnpm dlx vsce package --out vector.vsix

      - name: Upload vsix to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name || format('ext-v{0}', steps.version.outputs.version) }}
        run: gh release upload "$TAG" vector.vsix --clobber

      - name: Publish to VS Code Marketplace
        run: pnpm dlx vsce publish --packagePath vector.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: pnpm dlx ovsx publish vector.vsix --pat ${{ secrets.OVSX_PAT }}
