agents:
  claude:
    type: cli
    command: claude 'execute the content in the file <file>'
  antigravity:
    type: cli
    command: agy -i 'execute the content in the file <file>'
  codex:
    type: cli
    command: codex 'execute the content in the file <file>'
  opencode:
    type: cli
    command: opencode --prompt 'execute the content in the file <file>'
profiles:
  create-doc: [antigravity, claude, codex]
  code: [antigravity, claude, codex, opencode]
